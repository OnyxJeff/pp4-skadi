---
- name: Install core packages (Debian)
  package:
    name: "{{ common_packages_debian }}"
    state: present
  when: ansible_os_family == "Debian"

- name: Install core packages (RedHat)
  package:
    name: "{{ common_packages_redhat }}"
    state: present
  when: ansible_os_family == "RedHat"
